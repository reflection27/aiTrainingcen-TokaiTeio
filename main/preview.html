<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>东海帝王AI担当 - 预览</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Microsoft YaHei UI', 'Microsoft YaHei', sans-serif;
    background: #f2f4f7;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* 主窗口 */
  .app-window {
    width: 1350px;
    height: 850px;
    background: #f2f4f7;
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 12px;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }

  /* ========== 左侧聊天区 ========== */
  .chat-panel {
    flex: 0 0 780px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* 区块标题 - wiki风格绿渐变 */
  .section-header {
    background: linear-gradient(to bottom, #AEEA00, #4CAF50);
    color: #fff;
    font-weight: bold;
    font-size: 14px;
    padding: 8px 14px;
    border-radius: 6px 6px 0 0;
    letter-spacing: 1px;
  }

  /* 聊天框 */
  .chat-box {
    flex: 1;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-top: none;
    border-radius: 0 0 6px 6px;
    padding: 14px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 10px;
  }

  /* 消息行 */
  .msg-row { margin-bottom: 4px; }

  .msg-text {
    font-size: 14px;
    color: #333;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  /* 输入区 */
  .input-area {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 10px;
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 12px;
  }

  .input-area input {
    flex: 1;
    border: 1.5px solid #e0e0e0;
    border-radius: 20px;
    padding: 9px 16px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    background: #fafafa;
    transition: border-color 0.2s, background 0.2s;
  }
  .input-area input:focus {
    border-color: #4CAF50;
    background: #fff;
  }
  .input-area input::placeholder { color: #bbb; }

  .status-bar {
    font-size: 12px;
    color: #4a90e2;
    padding: 0 4px;
    margin-top: -6px;
    margin-bottom: -6px;
  }

  /* ========== 按钮基础样式 ========== */
  .btn {
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: bold;
    font-family: inherit;
    cursor: pointer;
    transition: filter 0.15s;
    white-space: nowrap;
    padding: 9px 10px;
  }
  .btn:hover  { filter: brightness(0.91); }
  .btn:active { filter: brightness(0.80); }

  /* 颜色变体 */
  .btn-green  { background: linear-gradient(to bottom, #AEEA00, #4CAF50); }
  .btn-gray   { background: linear-gradient(to bottom, #CFD8DC, #90A4AE); }
  .btn-pink   { background: linear-gradient(to bottom, #F06292, #C2185B); }
  .btn-dkgray { background: linear-gradient(to bottom, #78909C, #455A64); }
  .btn-blue   { background: linear-gradient(to bottom, #42A5F5, #1565C0); }
  .btn-red    { background: linear-gradient(to bottom, #EF5350, #C62828); }
  .btn-purple { background: linear-gradient(to bottom, #AB47BC, #7B1FA2); }

  /* 输入区图标按钮 */
  .btn-icon { font-size: 16px; padding: 9px 12px; }

  /* ========== 右侧面板 ========== */
  .right-panel {
    flex: 0 0 480px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* 角色图片卡片 */
  .chara-card {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .chara-card img {
    width: 80%;
    display: block;
    margin: 0 auto;
    max-height: 575px;
    object-fit: cover;
    object-position: top;
  }

  /* 状态卡片 */
  .status-card {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    flex-shrink: 0;
  }

  .status-body {
    padding: 6px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .status-row {
    display: flex;
    align-items: center;
    font-size: 13px;
    border-bottom: 1px solid #f0f0f0;
    padding-bottom: 4px;
  }
  .status-row:last-child { border-bottom: none; padding-bottom: 0; }

  .status-label {
    color: #888;
    font-weight: bold;
    width: 72px;
    flex-shrink: 0;
    text-align: right;
    padding-right: 10px;
  }

  .status-value {
    color: #4a90e2;
    font-weight: bold;
    font-size: 13px;
  }

  /* 按钮组 - 两排四列 */
  .btn-group {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-top: -4px;
  }

</style>
</head>
<body>

<div class="app-window">

  <!-- 左侧聊天区 -->
  <div class="chat-panel">
    <div class="section-header">聊天记录</div>
    <div class="chat-box">


    </div>

    <!-- 输入区 -->
    <div class="input-area">
      <input type="text" placeholder="输入消息，按 Enter 发送…" />
      <button class="btn btn-green btn-icon">📷</button>
      <button class="btn btn-gray btn-icon">🎤</button>
      <button class="btn btn-green" style="padding:9px 18px;">发送</button>
    </div>
    <div class="status-bar">就绪 | 模型: deepseek-chat | 记忆系统: 正常 | <span id="clock2">--:--:--</span></div>
  </div>

  <!-- 右侧面板 -->
  <div class="right-panel">

    <!-- 状态信息 -->
    <div class="status-card">
      <div class="section-header">系统状态</div>
      <div class="status-body">
        <div class="status-row">
          <span class="status-label">当前模型</span>
          <span class="status-value">deepseek-reasoner</span>
        </div>
        <div class="status-row">
          <span class="status-label">角色选择</span>
          <span class="status-value">东海帝王</span>
        </div>
        <div class="status-row">
          <span class="status-label">记忆系统</span>
          <span class="status-value">正常</span>
        </div>
        <div class="status-row">
          <span class="status-label">预载应用</span>
          <span class="status-value">3</span>
        </div>
        <div class="status-row">
          <span class="status-label">当前时间</span>
          <span class="status-value" id="clock">--:--:--</span>
        </div>
      </div>
    </div>

    <!-- 角色图片 -->
    <div class="chara-card">
      <img src="assets/TokaiTeio.png" alt="东海帝王" />
    </div>

    <!-- 操作按钮 两排四列 -->
    <div class="btn-group">
      <button class="btn btn-blue">游戏模式</button>
      <button class="btn btn-pink">陪伴模式</button>
      <button class="btn btn-dkgray">悬浮窗模式</button>
      <button class="btn btn-gray">多模态: 关</button>
      <button class="btn btn-green">记忆系统</button>
      <button class="btn btn-green">设置</button>
      <button class="btn btn-red">测试</button>
      <button class="btn btn-purple">测试事件</button>
    </div>

  </div>
</div>

<script>
  function tick() {
    const t = new Date().toLocaleTimeString('zh-CN');
    document.getElementById('clock').textContent = t;
    document.getElementById('clock2').textContent = t;
  }
  tick();
  setInterval(tick, 1000);
</script>

</body>
</html>
